<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Springcompany — Trending Posts and Celebrity News">
  <meta name="keywords" content="trending posts, celebrity news, entertainment news">
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="apple-touch-icon" href="img/logo.png">
  <title>Trending Posts — Springcompany</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{
      --gold:#D4AF37;--gold2:#F5CC5A;--gold3:#8B7322;
      --bg:#0A0A0F;--bg2:#111118;--bg3:#18181F;--bg4:#1E1E28;
      --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
      --text:#F0EEF8;--muted:#8A87A0;--dim:#4A4860;
      --accent:#C084FC;--accent2:#A855F7;--red:#F43F5E;--green:#10B981;
      --border:rgba(255,255,255,0.08);--border2:rgba(212,175,55,0.25);
      --glow:0 0 40px rgba(212,175,55,0.15);
      --r:12px;--r2:20px;
    }
    [data-theme="light"]{
      --bg:#F8F7FF;--bg2:#F0EEF8;--bg3:#E8E5F5;--bg4:#DDD9F0;
      --text:#0A0A1F;--muted:#5A5780;--dim:#9A97B0;
      --surface:rgba(0,0,0,0.03);--surface2:rgba(0,0,0,0.06);
      --border:rgba(0,0,0,0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;cursor:default}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:2px}
    .display{font-family:'Bebas Neue',sans-serif;letter-spacing:2px}
    .serif{font-family:'Playfair Display',serif}
    
    /* NAVBAR */
    #navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 32px;height:72px;display:flex;align-items:center;justify-content:space-between;transition:all .3s;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,175,55,0.15);box-shadow:0 2px 20px rgba(0,0,0,0.06)}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-family:'Bebas Neue',sans-serif;color:#000;letter-spacing:0}
    .nav-logo-text{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;background:linear-gradient(135deg,#8B7322,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-link{color:#3a3760;font-size:.84rem;font-weight:600;text-decoration:none;padding:8px 14px;border-radius:8px;transition:all .2s;letter-spacing:.3px}
    .nav-link:hover{color:var(--gold);background:rgba(212,175,55,0.08)}
    
    main{margin-top:72px;padding:40px 32px}
    .page-header{text-align:center;margin-bottom:60px}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;color:var(--text)}
    .page-title span{color:var(--gold)}
    .page-sub{font-size:1.1rem;color:var(--muted);max-width:600px;margin:0 auto}
    
    .posts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:24px;margin-bottom:60px}
    .trend-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .3s;cursor:pointer}
    .trend-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 8px 24px rgba(212,175,55,0.15)}
    .trend-img{width:100%;height:200px;background-size:cover;background-position:center;position:relative;display:flex;align-items:flex-end;padding:16px}
    .trend-category{display:inline-block;background:var(--gold);color:#000;padding:4px 12px;border-radius:20px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
    .trend-body{padding:20px}
    .trend-body h4{font-family:'Playfair Display',serif;font-size:1.3rem;margin-bottom:8px;color:var(--text)}
    .trend-body p{font-size:.9rem;color:var(--muted);line-height:1.6;margin-bottom:16px}
    .trend-footer{display:flex;justify-content:space-between;align-items:center;color:var(--dim);font-size:.85rem}
    .trend-footer span:last-child{color:var(--gold);font-weight:600;cursor:pointer}
    
    .back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--gold);text-decoration:none;font-weight:600;margin-bottom:32px;transition:all .3s}
    .back-btn:hover{gap:12px}
    
    footer{background:var(--bg2);padding:32px;text-align:center;color:var(--muted);font-size:.85rem;margin-top:60px}
    
    @media(max-width:768px){
      main{padding:20px 16px;margin-top:72px}
      .page-title{font-size:2rem}
      .posts-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">S</div>
      <span class="nav-logo-text">SPRINGCOMPANY</span>
    </a>
    <div style="display:flex;gap:16px">
      <a href="index.html" class="nav-link">Home</a>
      <a href="featured-celebrities.html" class="nav-link">Celebrities</a>
      <a href="featured-videos.html" class="nav-link">Videos</a>
    </div>
  </nav>

  <main>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    
    <div class="page-header">
      <h1 class="page-title">Trending <span>Posts</span></h1>
      <p class="page-sub">Stay updated with the latest celebrity news, booking trends, and platform announcements.</p>
    </div>

    <div class="posts-grid" id="postsGrid"></div>
  </main>

  <footer>
    <p>&copy; 2025 Springcompany. All rights reserved. | <a href="#" style="color:var(--gold);text-decoration:none">Privacy Policy</a> | <a href="#" style="color:var(--gold);text-decoration:none">Terms of Service</a></p>
  </footer>

  <script>
    var TRENDING = [
      {cat:'Booking',title:'Taylor Swift Clone Books Out in Minutes',text:'Record-breaking demand for pop star lookalike appearances at corporate events.',img:'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=400&q=80',date:'2h ago'},
      {cat:'News',title:'Meet & Greet Packages Now Include VR Experience',text:'Springcompany launches immersive virtual reality pre-show meet and greet experiences.',img:'https://images.unsplash.com/photo-1429962714451-bb934ecdc4ec?w=400&q=80',date:'5h ago'},
      {cat:'Celebrity',title:'Marcus Williams Joins Springcompany Platform',text:'Oscar-winning actor Marcus Williams officially joins the Springcompany booking roster.',img:'https://images.unsplash.com/photo-1540575467063-178a50c2df87?w=400&q=80',date:'1d ago'},
      {cat:'Fan Card',title:'Gold Fan Cards Sell Out in 48 Hours',text:'Unprecedented demand for gold tier fan cards as platform hits 1M users.',img:'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=400&q=80',date:'2d ago'},
      {cat:'Payment',title:'Bitcoin Payments Now Accepted Globally',text:'Springcompany becomes first major booking platform to accept full BTC payments.',img:'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=400&q=80',date:'3d ago'},
      {cat:'Event',title:'Hollywood Gala 2025 — Celebrity Lineup Revealed',text:'12 A-list celebrities confirmed for the most star-studded gala in platform history.',img:'https://images.unsplash.com/photo-1501386761578-eac5c94b800a?w=400&q=80',date:'4d ago'},
      {cat:'Booking',title:'Premium Plus Tier Launches with Exclusive Perks',text:'New membership tier with early access to celebrity bookings and VIP events.',img:'https://images.unsplash.com/photo-1516450360452-9312f5e86fc7?w=400&q=80',date:'5d ago'},
      {cat:'News',title:'Springcompany Expands to 50+ Countries',text:'Platform now available globally with localized payment methods and 24/7 support.',img:'https://images.unsplash.com/photo-1429962714451-bb934ecdc4ec?w=400&q=80',date:'1w ago'},
    ];

    window.addEventListener('load', function() {
      renderPosts();
    });

    function renderPosts() {
      var grid = document.getElementById('postsGrid');
      grid.innerHTML = TRENDING.map(function(t) {
        return '<div class="trend-card"><div class="trend-img" style="background-image:url(\''+t.img+'\')" loading="lazy"><span class="trend-category">'+t.cat+'</span></div><div class="trend-body"><h4>'+t.title+'</h4><p>'+t.text+'</p><div class="trend-footer"><span>'+t.date+'</span><span style="color:var(--gold);font-size:.76rem;font-weight:600;cursor:pointer">Read →</span></div></div></div>';
      }).join('');
    }
  </script>
</body>
</html>
