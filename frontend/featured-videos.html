<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="Springcompany — Featured Videos and Entertainment Content">
  <meta name="keywords" content="featured videos, celebrity videos, entertainment content">
  <link rel="icon" type="image/png" href="img/logo.png">
  <link rel="apple-touch-icon" href="img/logo.png">
  <title>Featured Videos — Springcompany</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Sans:wght@300;400;500;600&family=Bebas+Neue&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    :root{
      --gold:#D4AF37;--gold2:#F5CC5A;--gold3:#8B7322;
      --bg:#0A0A0F;--bg2:#111118;--bg3:#18181F;--bg4:#1E1E28;
      --surface:rgba(255,255,255,0.04);--surface2:rgba(255,255,255,0.07);
      --text:#F0EEF8;--muted:#8A87A0;--dim:#4A4860;
      --accent:#C084FC;--accent2:#A855F7;--red:#F43F5E;--green:#10B981;
      --border:rgba(255,255,255,0.08);--border2:rgba(212,175,55,0.25);
      --glow:0 0 40px rgba(212,175,55,0.15);
      --r:12px;--r2:20px;
    }
    [data-theme="light"]{
      --bg:#F8F7FF;--bg2:#F0EEF8;--bg3:#E8E5F5;--bg4:#DDD9F0;
      --text:#0A0A1F;--muted:#5A5780;--dim:#9A97B0;
      --surface:rgba(0,0,0,0.03);--surface2:rgba(0,0,0,0.06);
      --border:rgba(0,0,0,0.08);
    }
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;cursor:default}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:2px}
    .display{font-family:'Bebas Neue',sans-serif;letter-spacing:2px}
    .serif{font-family:'Playfair Display',serif}
    
    /* NAVBAR */
    #navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 32px;height:72px;display:flex;align-items:center;justify-content:space-between;transition:all .3s;background:rgba(255,255,255,0.97);backdrop-filter:blur(20px);border-bottom:1px solid rgba(212,175,55,0.15);box-shadow:0 2px 20px rgba(0,0,0,0.06)}
    .nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
    .nav-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),var(--gold3));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;font-family:'Bebas Neue',sans-serif;color:#000;letter-spacing:0}
    .nav-logo-text{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;background:linear-gradient(135deg,#8B7322,#D4AF37);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .nav-link{color:#3a3760;font-size:.84rem;font-weight:600;text-decoration:none;padding:8px 14px;border-radius:8px;transition:all .2s;letter-spacing:.3px}
    .nav-link:hover{color:var(--gold);background:rgba(212,175,55,0.08)}
    
    main{margin-top:72px;padding:40px 32px}
    .page-header{text-align:center;margin-bottom:60px}
    .page-title{font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;color:var(--text)}
    .page-title span{color:var(--gold)}
    .page-sub{font-size:1.1rem;color:var(--muted);max-width:600px;margin:0 auto}
    
    .videos-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:24px}
    .video-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:all .3s}
    .video-card:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 8px 24px rgba(212,175,55,0.15)}
    .video-embed{width:100%;height:180px;background:var(--bg3);position:relative}
    .video-embed iframe{width:100%;height:100%;border:none}
    .video-play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .3s;cursor:pointer}
    .video-card:hover .video-play-overlay{opacity:1}
    .video-play-btn{width:50px;height:50px;background:var(--gold);border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#000;font-size:1.2rem;transition:transform .2s}
    .video-play-btn:hover{transform:scale(1.1)}
    
    .video-body{padding:16px}
    .video-title{font-weight:700;color:var(--text);margin-bottom:4px;font-size:.95rem;line-height:1.4}
    .video-sub{font-size:.8rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
    .video-badge{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:.7rem;color:var(--gold);font-weight:600}
    
    .back-btn{display:inline-flex;align-items:center;gap:8px;color:var(--gold);text-decoration:none;font-weight:600;margin-bottom:32px;transition:all .3s}
    .back-btn:hover{gap:12px}
    
    footer{background:var(--bg2);padding:32px;text-align:center;color:var(--muted);font-size:.85rem;margin-top:60px}
    
    @media(max-width:768px){
      main{padding:20px 16px;margin-top:72px}
      .page-title{font-size:2rem}
      .videos-grid{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <nav id="navbar">
    <a href="index.html" class="nav-logo">
      <div class="nav-logo-icon">S</div>
      <span class="nav-logo-text">SPRINGCOMPANY</span>
    </a>
    <div style="display:flex;gap:16px">
      <a href="index.html" class="nav-link">Home</a>
      <a href="trending-posts.html" class="nav-link">Posts</a>
      <a href="featured-celebrities.html" class="nav-link">Celebrities</a>
    </div>
  </nav>

  <main>
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Home</a>
    
    <div class="page-header">
      <h1 class="page-title">Featured <span>Videos</span></h1>
      <p class="page-sub">Exclusive celebrity content, event highlights, and behind-the-scenes footage from Springcompany.</p>
    </div>

    <div class="videos-grid" id="videosGrid"></div>
  </main>

  <footer>
    <p>&copy; 2025 Springcompany. All rights reserved. | <a href="#" style="color:var(--gold);text-decoration:none">Privacy Policy</a> | <a href="#" style="color:var(--gold);text-decoration:none">Terms of Service</a></p>
  </footer>

  <script>
    var VIDEOS = [
      {title:'Celebrity Event Highlights 2024',subtitle:'Springcompany Exclusive',views:'2.4M views',url:'https://www.youtube.com/embed/dQw4w9WgXcQ'},
      {title:'Behind The Scenes: VIP Booking',subtitle:'Springcompany Exclusive',views:'1.8M views',url:'https://www.youtube.com/embed/9bZkp7q19f0'},
      {title:'Meet & Greet Experience Recap',subtitle:'Springcompany Exclusive',views:'3.1M views',url:'https://www.youtube.com/embed/kJQP7kiw5Fk'},
      {title:'Celebrity Red Carpet Moments',subtitle:'Awards Ceremony 2024',views:'2.9M views',url:'https://www.youtube.com/embed/jNQXAC9IVRw'},
      {title:'VIP Event Coverage',subtitle:'Spring Gala 2024',views:'1.5M views',url:'https://www.youtube.com/embed/9bZkp7q19f0'},
      {title:'Celebrity Interview Collection',subtitle:'One-on-One Sessions',views:'2.2M views',url:'https://www.youtube.com/embed/dQw4w9WgXcQ'},
      {title:'Music Performance Highlights',subtitle:'Concert Series',views:'3.6M views',url:'https://www.youtube.com/embed/kJQP7kiw5Fk'},
      {title:'Fan Appreciation Event',subtitle:'Springcompany Exclusive',views:'1.9M views',url:'https://www.youtube.com/embed/9bZkp7q19f0'},
      {title:'Celebrity Lifestyle Documentary',subtitle:'Springcompany Originals',views:'2.7M views',url:'https://www.youtube.com/embed/dQw4w9WgXcQ'},
      {title:'Behind the Booking: How It Works',subtitle:'Educational Series',views:'1.3M views',url:'https://www.youtube.com/embed/jNQXAC9IVRw'},
      {title:'Exclusive Celebrity Interviews',subtitle:'In-Depth Conversations',views:'2.5M views',url:'https://www.youtube.com/embed/kJQP7kiw5Fk'},
      {title:'Event Production Showcase',subtitle:'Springcompany Productions',views:'1.7M views',url:'https://www.youtube.com/embed/9bZkp7q19f0'},
    ];

    window.addEventListener('load', function() {
      renderVideos();
    });

    function renderVideos() {
      var grid = document.getElementById('videosGrid');
      grid.innerHTML = VIDEOS.map(v => 
        '<div class="video-card">'+
          '<div class="video-embed">'+
            '<iframe src="'+v.url+'" allowfullscreen loading="lazy"></iframe>'+
            '<div class="video-play-overlay"><button class="video-play-btn"><i class="fas fa-play"></i></button></div>'+
          '</div>'+
          '<div class="video-body">'+
            '<div class="video-title">'+v.title+'</div>'+
            '<div class="video-sub">'+
              '<span class="video-badge"><i class="fas fa-film"></i>'+v.subtitle+'</span>'+
              '<span class="video-badge" style="color:var(--green)"><i class="fas fa-eye"></i>'+v.views+'</span>'+
            '</div>'+
          '</div>'+
        '</div>'
      ).join('');
    }
  </script>
</body>
</html>
